name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar arquivos compactados
        run: |
          VERSION=${GITHUB_REF_NAME}

          git archive \
            --format=tar.gz \
            --prefix=postfix-smtp-relay-${VERSION}/ \
            -o postfix-smtp-relay-${VERSION}.tar.gz \
            HEAD

          git archive \
            --format=zip \
            --prefix=postfix-smtp-relay-${VERSION}/ \
            -o postfix-smtp-relay-${VERSION}.zip \
            HEAD

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            postfix-smtp-relay-*.tar.gz
            postfix-smtp-relay-*.zip
